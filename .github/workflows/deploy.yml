name: Deploy Patria Backend Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy via HTTP webhook
        run: |
          echo "🚀 Calling deploy hook on server..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "http://${{ secrets.SERVER_HOST }}:5000/api/deploy-hook?secret=${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5)

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Deploy hook triggered successfully"
          else
            echo "❌ Deploy hook returned status $RESPONSE — falling back to SSH..."
            exit 1
          fi

  deploy-ssh-fallback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Runner IP
        run: |
          echo "GitHub Actions runner IP:"
          curl -s https://api.ipify.org

      - name: Deploy to VPS via SSH (fallback)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/patria-backend-1
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "✅ SSH fallback deploy complete!"
            docker compose ps
