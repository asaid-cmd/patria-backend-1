name: Deploy Patria Backend Production



on:

  push:

    branches:

      - main



jobs:

  deploy:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout Code

        uses: actions/checkout@v4



      - name: Deploy to VPS via SSH

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.SERVER_HOST }}

          username: ${{ secrets.SERVER_USER }}

          key: ${{ secrets.SERVER_SSH_KEY }}

          port: 22

          script: |

            # Navigate to the project deployment directory

            cd /var/www/patria-backend-1



            # Fetch the absolute latest changes from repository

            git pull origin main



            # Rebuild and restart the Docker stack cleanly

            # Using --build ensures any code changes in your Node.js app are re-compiled

            docker compose down

            docker compose up -d --build

            # Wait for container to be ready

            sleep 10

            # Seed coupons (upsert — safe to run multiple times)

            docker compose exec -T backend npm run seed:coupons



            # Verify the status of running containers

            #docker compose ps