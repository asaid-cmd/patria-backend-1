name: Deploy Patria Backend Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy via HTTP hook
        run: |
          echo "🚀 Calling deploy hook on server..."

          STATUS=$(curl -s -o /tmp/hook_response.txt -w "%{http_code}" \
            -X POST \
            "http://${{ secrets.SERVER_HOST }}:5000/api/deploy-hook?secret=${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5)

          echo "HTTP status: $STATUS"
          echo "Response: $(cat /tmp/hook_response.txt)"

          if [ "$STATUS" = "200" ]; then
            echo "✅ Deploy hook triggered — server is pulling latest code and restarting"
          else
            echo "❌ Hook returned $STATUS — check SERVER_HOST and DEPLOY_SECRET secrets"
            exit 1
          fi
