name: Deploy Patria Backend Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Runner IP (for firewall whitelist debugging)
        run: |
          echo "GitHub Actions runner IP:"
          curl -s https://api.ipify.org
          echo ""

      - name: Wait for SSH to be available
        run: |
          echo "Testing TCP connectivity to ${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT || '22' }}..."
          for i in 1 2 3; do
            if nc -zw 10 ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT || 22 }}; then
              echo "✅ SSH port is reachable"
              break
            fi
            echo "⚠️  Attempt $i failed — retrying in 10s..."
            sleep 10
          done

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e

            echo "📂 Navigating to project directory..."
            cd /var/www/patria-backend-1

            echo "⬇️  Pulling latest changes..."
            git pull origin main

            echo "🐳 Rebuilding Docker containers..."
            docker compose down
            docker compose up -d --build

            echo "✅ Deploy complete!"
            docker compose ps
