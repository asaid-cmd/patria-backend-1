version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: patria-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: patria
    volumes:
      - mongodb_data:/data/db
    networks:
      - patria-network

  backend:
    build: .
    container_name: patria-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/patria?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-patria_secret_key_dev}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-patria_refresh_key_dev}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      - mongodb
    networks:
      - patria-network
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  patria-network:
    driver: bridge
